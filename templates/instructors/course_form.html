{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}ایجاد دوره جدید{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h4>➕ ایجاد دوره جدید</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-success">ذخیره دوره</button>
                    <a href="{% url 'instructors:dashboard' %}" class="btn btn-secondary">انصراف</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
