{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}بازیابی رمز عبور{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card card-modern">
            <div class="card-body">
                <h3 class="fw-bold">بازیابی رمز عبور</h3>
                <p class="text-muted">ایمیل خود را وارد کنید. لینک بازیابی برای شما ارسال می‌شود.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 rounded-pill">ارسال لینک بازیابی</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'academy:login' %}">بازگشت به صفحه ورود</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
