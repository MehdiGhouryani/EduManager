{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}تغییر رمز عبور{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card card-modern">
            <div class="card-body">
                <h3 class="fw-bold mb-3">تغییر رمز عبور</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary rounded-pill w-100 mt-3">تغییر رمز</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
